# Secret holding the AI API key. The value below is an EMPTY placeholder so the service
# still deploys and runs in deterministic (graceful-degradation) mode out of the box.
#
# To enable the live LLM (Claude, claude-opus-4-8), set a real key, e.g.:
#   kubectl create secret generic fraud-service-secrets \
#     --from-literal=SECUREBANK_AI_API_KEY='sk-ant-...'
#
# stringData lets us provide the value in plain text; Kubernetes base64-encodes it.
apiVersion: v1
kind: Secret
metadata:
  name: fraud-service-secrets
  labels:
    app: fraud-service
type: Opaque
stringData:
  # Blank by default => deterministic provider is used. Replace to go live.
  SECUREBANK_AI_API_KEY: ""
